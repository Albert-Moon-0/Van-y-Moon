<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Música - Van & Moon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cssP.css">
  <style>
    /* Estilos específicos de playlist */
    .playlist-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--gap-xl);
      padding-bottom: var(--gap-xl);
    }

    .playlist-header {
      text-align: center;
      animation: fadeInDown 0.8s ease forwards;
    }

    .playlist-header h1 {
      color: white;
      margin-bottom: var(--gap-sm);
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }

    .playlist-header p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.05rem;
    }

    /* Reproductor elegante */
    .player-container {
      width: 100%;
      max-width: 500px;
      animation: slideInLeft 1s ease forwards;
    }

    .player {
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: var(--gap-lg);
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .player::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(135deg, rgba(236, 72, 153, 0.1), rgba(168, 85, 247, 0.1));
      z-index: 0;
    }

    .player-content {
      position: relative;
      z-index: 1;
    }

    /* Portada de canción */
    .cover-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto var(--gap-lg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(236, 72, 153, 0.3);
      animation: float 4s ease-in-out infinite;
      background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      transition: transform 0.4s ease;
    }

    .cover.playing {
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Info de canción */
    .song-info {
      text-align: center;
      margin-bottom: var(--gap-lg);
    }

    .song-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: var(--gap-xs);
      background: linear-gradient(135deg, #ec4899, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .song-artist {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
    }

    /* Controles - Diseño minimalista elegante */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin: var(--gap-lg) 0;
    }

    .control-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      font-size: 1.8rem;
      transition: all var(--transition-fast);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      color: #ec4899;
      transform: scale(1.2);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .control-btn.play-btn {
      font-size: 2.5rem;
      color: #ec4899;
      filter: drop-shadow(0 0 20px rgba(236, 72, 153, 0.4));
    }

    .control-btn.play-btn:hover {
      color: #a855f7;
      filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.5));
    }

    /* SoundCloud iframe oculto */
    .soundcloud-hidden {
      display: none;
      height: 0;
      width: 0;
      border: none;
    }

    /* Contenedor de iframes (oculto) */
    #soundcloud-container {
      display: none;
    }

    /* Lista de canciones */
    .playlist {
      width: 100%;
      max-width: 600px;
      display: grid;
      gap: var(--gap-md);
    }

    .playlist-header-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
      text-align: center;
      margin: var(--gap-lg) 0 var(--gap-md);
    }

    .song-item {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(236, 72, 153, 0.2);
      border-radius: var(--radius-md);
      padding: var(--gap-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: var(--gap-md);
    }

    .song-item:hover {
      background: rgba(236, 72, 153, 0.15);
      border-color: rgba(236, 72, 153, 0.4);
      transform: translateX(8px);
    }

    .song-item.active {
      background: rgba(236, 72, 153, 0.3);
      border-color: rgba(236, 72, 153, 0.6);
      box-shadow: var(--shadow-md);
    }

    .song-item-number {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
      min-width: 30px;
    }

    .song-item-info {
      flex: 1;
    }

    .song-item-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
    }

    .song-item-artist {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .song-item-play {
      font-size: 1.2rem;
      color: rgba(236, 72, 153, 0.6);
      transition: all var(--transition-fast);
    }

    .song-item:hover .song-item-play {
      color: #ec4899;
      transform: scale(1.2);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .playlist-container {
        padding: var(--gap-md);
      }

      .cover-container {
        width: 250px;
        height: 250px;
      }

      .cover {
        font-size: 60px;
      }

      .song-title {
        font-size: 1.3rem;
      }

      .controls {
        gap: 1.5rem;
      }

      .control-btn.play-btn {
        font-size: 2rem;
      }
    }

    @media (max-width: 480px) {
      .playlist-header h1 {
        font-size: 1.5rem;
      }

      .cover-container {
        width: 200px;
        height: 200px;
      }

      .cover {
        font-size: 50px;
      }

      .song-title {
        font-size: 1.1rem;
      }

      .song-artist {
        font-size: 0.9rem;
      }

      .controls {
        gap: 1rem;
      }

      .control-btn {
        font-size: 1.5rem;
      }

      .control-btn.play-btn {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- Nav incluida aquí -->
  <div id="navbar"></div>

  <div class="container">
    <div class="playlist-container">
      <div class="playlist-header">
        <h1>🎵 Nuestra Música</h1>
        <p>Canciones que significan algo para nosotros</p>
      </div>

      <div class="player-container">
        <div class="player">
          <div class="player-content">
            <div class="cover-container">
              <div class="cover" id="cover">🎵</div>
            </div>

            <div class="song-info">
              <div class="song-title" id="songTitle">Selecciona una canción</div>
              <div class="song-artist" id="songArtist">Toca para reproducir</div>
            </div>

            <div class="controls">
              <button class="control-btn" id="prevBtn" title="Anterior">⏮</button>
              <button class="control-btn play-btn" id="playBtn" title="Reproducir">▶</button>
              <button class="control-btn" id="nextBtn" title="Siguiente">⏭</button>
            </div>
          </div>
        </div>
      </div>

      <div class="playlist">
        <div class="playlist-header-title">📋 Mi Playlist</div>
        <div id="playlistItems"></div>
      </div>
    </div>
  </div>
  <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A1069269745&color=%23510b0c&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe><div style="font-size: 10px; color: #cccccc;line-break: anywhere;word-break: normal;overflow: hidden;white-space: nowrap;text-overflow: ellipsis; font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;font-weight: 100;"><a href="https://soundcloud.com/themarias" title="The Marías" target="_blank" style="color: #cccccc; text-decoration: none;">The Marías</a> · <a href="https://soundcloud.com/themarias/little-by-little" title="Little by Little" target="_blank" style="color: #cccccc; text-decoration: none;">Little by Little</a></div>

  <!-- SoundCloud iframes ocultos (para reproducción real) -->
  <div id="soundcloud-container"></div>

  <script>
    // Array de canciones de SoundCloud
    const songs = [
      {
        title: "Little by Little",
        artist: "The Marías",
        emoji: "💕",
        iframeHTML: `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1069269745&color=%23a855f7&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>`
      },
      {
        title: "Más Grandes",
        artist: "La Gusana Ciega",
        emoji: "🎸",
        iframeHTML: `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/318449795&color=%23a855f7&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>`
      },
      {
        title: "Canción 3",
        artist: "Tu artista favorito",
        emoji: "🎤",
        iframeHTML: `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/0&color=%23a855f7&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>`
      }
    ];

    let currentSongIndex = 0;
    let isPlaying = false;

    const playBtn = document.getElementById('playBtn');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const songTitle = document.getElementById('songTitle');
    const songArtist = document.getElementById('songArtist');
    const cover = document.getElementById('cover');
    const soundcloudContainer = document.getElementById('soundcloud-container');

    // Cargar canción
    function loadSong(index) {
      currentSongIndex = index;
      const song = songs[index];
      
      songTitle.textContent = song.title;
      songArtist.textContent = song.artist;
      cover.textContent = song.emoji;

      // Cargar el iframe
      soundcloudContainer.innerHTML = song.iframeHTML;
      
      // Recargar los widgets de SoundCloud
      if (window.SC && window.SC.Widget) {
        window.SC.Widget.load();
      }

      updatePlaylistUI();
      isPlaying = false;
      playBtn.textContent = '▶';
      cover.classList.remove('playing');
    }

    // Reproducir/Pausar
    function togglePlay() {
      const widget = window.SC.Widget(soundcloudContainer.querySelector('iframe'));
      
      if (!widget) {
        console.error('Widget no encontrado');
        return;
      }

      if (isPlaying) {
        widget.pause();
        playBtn.textContent = '▶';
        cover.classList.remove('playing');
        isPlaying = false;
      } else {
        widget.play();
        playBtn.textContent = '⏸';
        cover.classList.add('playing');
        isPlaying = true;
      }
    }

    // Siguiente canción
    function nextSong() {
      currentSongIndex = (currentSongIndex + 1) % songs.length;
      loadSong(currentSongIndex);
      setTimeout(() => {
        const widget = window.SC.Widget(soundcloudContainer.querySelector('iframe'));
        if (widget) {
          widget.play();
          playBtn.textContent = '⏸';
          cover.classList.add('playing');
          isPlaying = true;
        }
      }, 300);
    }

    // Canción anterior
    function prevSong() {
      currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
      loadSong(currentSongIndex);
      setTimeout(() => {
        const widget = window.SC.Widget(soundcloudContainer.querySelector('iframe'));
        if (widget) {
          widget.play();
          playBtn.textContent = '⏸';
          cover.classList.add('playing');
          isPlaying = true;
        }
      }, 300);
    }

    // Actualizar UI
    function updatePlaylistUI() {
      document.querySelectorAll('.song-item').forEach((item, index) => {
        item.classList.toggle('active', index === currentSongIndex);
      });
    }

    // Renderizar playlist
    function renderPlaylist() {
      const playlistItems = document.getElementById('playlistItems');
      playlistItems.innerHTML = songs.map((song, index) => `
        <div class="song-item" onclick="loadSongAndPlay(${index})">
          <span class="song-item-number">${index + 1}</span>
          <div class="song-item-info">
            <div class="song-item-title">${song.title}</div>
            <div class="song-item-artist">${song.artist}</div>
          </div>
          <span class="song-item-play">▶</span>
        </div>
      `).join('');
    }

    // Cargar y reproducir
    function loadSongAndPlay(index) {
      loadSong(index);
      setTimeout(() => {
        const widget = window.SC.Widget(soundcloudContainer.querySelector('iframe'));
        if (widget) {
          widget.play();
          playBtn.textContent = '⏸';
          cover.classList.add('playing');
          isPlaying = true;
        }
      }, 300);
    }

    // Event listeners
    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextSong);
    prevBtn.addEventListener('click', prevSong);

    // Cargar script de SoundCloud
    const scScript = document.createElement('script');
    scScript.src = 'https://soundcloud.com/player/api.js#onload=onSoundCloudScriptLoad';
    scScript.async = true;
    document.body.appendChild(scScript);

    window.onSoundCloudScriptLoad = function() {
      renderPlaylist();
      loadSong(0);
    };

    // Cargar nav
    fetch('nav.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('navbar').innerHTML = data;
      })
      .catch(error => console.error('Error cargando nav:', error));

    // Inicializar si SoundCloud ya está cargado
    setTimeout(() => {
      if (window.SC) {
        renderPlaylist();
        loadSong(0);
      }
    }, 800);
  </script>
</body>
</html>
