<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Música - Van & Moon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cssP.css">
  <style>
    /* Estilos específicos de playlist */
    .playlist-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--gap-xl);
      padding-bottom: var(--gap-xl);
    }

    .playlist-header {
      text-align: center;
      animation: fadeInDown 0.8s ease forwards;
    }

    .playlist-header h1 {
      color: white;
      margin-bottom: var(--gap-sm);
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }

    .playlist-header p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.05rem;
    }

    /* Reproductor */
    .player-container {
      width: 100%;
      max-width: 500px;
      animation: slideInLeft 1s ease forwards;
    }

    .player {
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: var(--gap-lg);
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .player::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(135deg, rgba(236, 72, 153, 0.1), rgba(168, 85, 247, 0.1));
      z-index: 0;
    }

    .player-content {
      position: relative;
      z-index: 1;
    }

    /* Portada de canción */
    .cover-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto var(--gap-lg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(236, 72, 153, 0.3);
      animation: float 4s ease-in-out infinite;
      background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      transition: transform 0.4s ease;
    }

    .cover.playing {
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Info de canción */
    .song-info {
      text-align: center;
      margin-bottom: var(--gap-lg);
    }

    .song-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: var(--gap-xs);
      background: linear-gradient(135deg, #ec4899, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .song-artist {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
    }

    /* SoundCloud iframe - Personalizar */
    .soundcloud-wrapper {
      margin: var(--gap-lg) 0;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(236, 72, 153, 0.2);
    }

    .soundcloud-wrapper iframe {
      border-radius: var(--radius-md);
      display: block !important;
    }

    /* Ocultar el link feo de SoundCloud */
    .soundcloud-wrapper + div {
      display: none !important;
    }

    /* Lista de canciones */
    .playlist {
      width: 100%;
      max-width: 600px;
      display: grid;
      gap: var(--gap-md);
    }

    .playlist-header-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
      text-align: center;
      margin: var(--gap-lg) 0 var(--gap-md);
    }

    .song-item {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(236, 72, 153, 0.2);
      border-radius: var(--radius-md);
      padding: var(--gap-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: var(--gap-md);
    }

    .song-item:hover {
      background: rgba(236, 72, 153, 0.15);
      border-color: rgba(236, 72, 153, 0.4);
      transform: translateX(8px);
    }

    .song-item.active {
      background: rgba(236, 72, 153, 0.3);
      border-color: rgba(236, 72, 153, 0.6);
      box-shadow: var(--shadow-md);
    }

    .song-item-number {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
      min-width: 30px;
    }

    .song-item-info {
      flex: 1;
    }

    .song-item-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
    }

    .song-item-artist {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .song-item-play {
      font-size: 1.2rem;
      color: rgba(236, 72, 153, 0.6);
      transition: all var(--transition-fast);
    }

    .song-item:hover .song-item-play {
      color: #ec4899;
      transform: scale(1.2);
    }

    /* Controles minimales */
    .controls {
      text-align: center;
      margin-top: var(--gap-md);
    }

    .control-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      font-size: 1.5rem;
      transition: all var(--transition-fast);
      padding: var(--gap-sm);
      margin: 0 var(--gap-sm);
    }

    .control-btn:hover {
      color: #ec4899;
      transform: scale(1.2);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .playlist-container {
        padding: var(--gap-md);
      }

      .cover-container {
        width: 250px;
        height: 250px;
      }

      .cover {
        font-size: 60px;
      }

      .song-title {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 480px) {
      .playlist-header h1 {
        font-size: 1.5rem;
      }

      .cover-container {
        width: 200px;
        height: 200px;
      }

      .cover {
        font-size: 50px;
      }

      .song-title {
        font-size: 1.1rem;
      }

      .control-btn {
        font-size: 1.2rem;
        padding: var(--gap-xs);
        margin: 0 var(--gap-xs);
      }
    }
  </style>
</head>
<body>
  <!-- Nav incluida aquí -->
  <div id="navbar"></div>

  <div class="container">
    <div class="playlist-container">
      <div class="playlist-header">
        <h1>🎵 Nuestra Música</h1>
        <p>Canciones que significan algo para nosotros</p>
      </div>

      <div class="player-container">
        <div class="player">
          <div class="player-content">
            <div class="cover-container">
              <div class="cover" id="cover">🎵</div>
            </div>

            <div class="song-info">
              <div class="song-title" id="songTitle">Selecciona una canción</div>
              <div class="song-artist" id="songArtist">Toca para reproducir</div>
            </div>

            <!-- Aquí van los iframes de SoundCloud -->
            <div id="soundcloud-player" class="soundcloud-wrapper"></div>

            <div class="controls">
              <button class="control-btn" id="prevBtn" title="Anterior">⏮</button>
              <button class="control-btn" id="playBtn" title="Reproducir">▶</button>
              <button class="control-btn" id="nextBtn" title="Siguiente">⏭</button>
            </div>
          </div>
        </div>
      </div>

      <div class="playlist">
        <div class="playlist-header-title">📋 Mi Playlist</div>
        <div id="playlistItems"></div>
      </div>
    </div>
  </div>

  <script>
    // Array de canciones con iframes de SoundCloud tal cual vienen
    const songs = [
      {
        title: "Little by Little",
        artist: "The Marías",
        emoji: "💕",
        iframeHTML: `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A1069269745&color=%23a855f7&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>`
      },
      {
        title: "Más Grandes",
        artist: "La Gusana Ciega",
        emoji: "🎸",
        iframeHTML: `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A318449795&color=%23a855f7&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false"></iframe>`
      },
      {
        title: "Quiero ver",
        artist: "Café Tacvba",
        emoji: "🎤",
        iframeHTML: `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A169203537&color=%23080404&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>`
      },
      {
        title: "Still Loving You",
        artist: "Scorpions",
        emoji: "🎤",
        iframeHTML: `<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A164354255&color=%2331322f&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>`
      },
      
    ];

    let currentSongIndex = 0;

    const songTitle = document.getElementById('songTitle');
    const songArtist = document.getElementById('songArtist');
    const cover = document.getElementById('cover');
    const soundcloudPlayer = document.getElementById('soundcloud-player');
    const playBtn = document.getElementById('playBtn');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');

    // Cargar canción
    function loadSong(index) {
      currentSongIndex = index;
      const song = songs[index];
      
      songTitle.textContent = song.title;
      songArtist.textContent = song.artist;
      cover.textContent = song.emoji;
      cover.classList.remove('playing');

      // Cargar el iframe de SoundCloud
      soundcloudPlayer.innerHTML = song.iframeHTML;

      updatePlaylistUI();
    }

    // Siguiente
    function nextSong() {
      currentSongIndex = (currentSongIndex + 1) % songs.length;
      loadSong(currentSongIndex);
    }

    // Anterior
    function prevSong() {
      currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
      loadSong(currentSongIndex);
    }

    // Toggle animación en cover
    function togglePlayAnimation() {
      cover.classList.toggle('playing');
    }

    // Actualizar UI de playlist
    function updatePlaylistUI() {
      document.querySelectorAll('.song-item').forEach((item, index) => {
        item.classList.toggle('active', index === currentSongIndex);
      });
    }

    // Renderizar lista
    function renderPlaylist() {
      const playlistItems = document.getElementById('playlistItems');
      playlistItems.innerHTML = songs.map((song, index) => `
        <div class="song-item ${index === 0 ? 'active' : ''}" onclick="selectSong(${index})">
          <span class="song-item-number">${index + 1}</span>
          <div class="song-item-info">
            <div class="song-item-title">${song.title}</div>
            <div class="song-item-artist">${song.artist}</div>
          </div>
          <span class="song-item-play">▶</span>
        </div>
      `).join('');
    }

    // Seleccionar canción
    function selectSong(index) {
      loadSong(index);
    }

    // Event listeners
    playBtn.addEventListener('click', togglePlayAnimation);
    nextBtn.addEventListener('click', nextSong);
    prevBtn.addEventListener('click', prevSong);

    // Cargar nav
    fetch('nav.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('navbar').innerHTML = data;
      })
      .catch(error => console.error('Error cargando nav:', error));

    // Inicializar
    renderPlaylist();
    loadSong(0);
  </script>
</body>
</html>
